<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Criar OG Image</title>
</head>
<body>
    <h1>Gerando imagem OG...</h1>
    <canvas id="canvas" width="1200" height="630"></canvas>
    <a id="download" style="display:none">Download</a>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Fundo azul
        ctx.fillStyle = '#1e3a8a';
        ctx.fillRect(0, 0, 1200, 630);
        
        // Logo - fundo dourado
        ctx.fillStyle = '#c8a960';
        ctx.fillRect(475, 120, 250, 250);
        
        // Logo - fundo azul interno
        ctx.fillStyle = '#1e3a8a';
        ctx.fillRect(500, 145, 200, 200);
        
        // Logo - texto GS
        ctx.fillStyle = 'white';
        ctx.font = 'bold 72px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GS', 600, 245);
        
        // Logo - linha dourada
        ctx.fillStyle = '#c8a960';
        ctx.fillRect(540, 310, 120, 10);
        
        // Título
        ctx.fillStyle = 'white';
        ctx.font = 'bold 80px Arial, sans-serif';
        ctx.fillText('GrupoSys', 600, 440);
        
        // Subtítulo
        ctx.fillStyle = '#c8a960';
        ctx.font = '36px Arial, sans-serif';
        ctx.fillText('Soluções em Tecnologia', 600, 510);
        
        // URL
        ctx.fillStyle = 'white';
        ctx.font = '28px Arial, sans-serif';
        ctx.fillText('www.gruposys.com.br', 600, 580);
        
        // Converter para PNG e baixar
        setTimeout(() => {
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.getElementById('download');
                link.href = url;
                link.download = 'og-image.png';
                link.style.display = 'block';
                link.textContent = 'Clique aqui para baixar og-image.png';
                link.click();
                
                document.body.innerHTML += '<p style="color: green; font-size: 20px; margin-top: 20px;">✓ Imagem gerada! Salve como og-image.png na raiz do projeto.</p>';
            }, 'image/png', 1.0);
        }, 100);
    </script>
</body>
</html>
